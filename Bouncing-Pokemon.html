<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent !important; width: 100%; height: 100%; overflow: hidden; }
  #setup-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #0a0a0f;
    font-family: 'Press Start 2P', monospace;
    z-index: 100;
  }
  #setup-screen.hidden { display: none; }
  .setup-card { background: #13131a; border: 1px solid #2a2a3a; border-radius: 12px; padding: 32px 28px; width: 100%; max-width: 480px; }
  .setup-label { font-size: 7px; color: #64748b; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
  .setup-input-row { display: flex; gap: 10px; align-items: stretch; }
  .setup-input-wrap { flex: 1; display: flex; align-items: center; background: #1c1c26; border: 1px solid #2a2a3a; border-radius: 8px; padding: 0 14px; transition: border-color 0.2s; }
  .setup-input-wrap:focus-within { border-color: #a855f7; }
  .setup-input-wrap span { color: #64748b; font-size: 13px; margin-right: 4px; user-select: none; }
  .setup-input-wrap input { flex: 1; background: transparent; border: none; outline: none; color: #e2e8f0; font-family: 'Press Start 2P', monospace; font-size: 11px; padding: 14px 0; }
  .setup-input-wrap input::placeholder { color: #64748b; }
  .setup-btn { background: #7c3aed; color: white; border: none; border-radius: 8px; padding: 14px 20px; font-family: 'Press Start 2P', monospace; font-size: 7px; letter-spacing: 1px; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .setup-btn:hover { background: #a855f7; }
  .setup-hint { font-size: 9px; color: #64748b; margin-top: 12px; line-height: 1.8; }
  .setup-error { font-size: 8px; color: #ef4444; margin-top: 10px; display: none; }
  #overlay { position: relative; width: 100%; height: 100vh; background: transparent; overflow: hidden; font-family: 'Press Start 2P', monospace; }
  #banner { position: absolute; top: 16px; left: 50%; transform: translateX(-50%) translateY(-140px); transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1); z-index: 10; white-space: nowrap; pointer-events: none; }
  #banner.show { transform: translateX(-50%) translateY(0); }
  .banner-box { background: rgba(8,6,18,0.92); border: 2px solid #f5c518; border-radius: 10px; padding: 10px 22px 10px 16px; display: flex; align-items: center; gap: 12px; }
  .banner-ball { width: 26px; height: 26px; flex-shrink: 0; animation: bspin 1.2s linear infinite; }
  @keyframes bspin { to { transform: rotate(360deg); } }
  .banner-label { font-size: 7px; color: #f5c518; letter-spacing: 2px; margin-bottom: 5px; opacity: 0.8; }
  .banner-name { font-size: 14px; color: #fff; }
  .banner-name em { color: #f5c518; font-style: normal; }
  .blink { animation: blnk 0.5s step-end infinite; color: #ef4444; }
  @keyframes blnk { 50% { opacity: 0; } }
  .poke-sprite { position: absolute; width: 96px; height: 96px; image-rendering: pixelated; pointer-events: none; transition: opacity 0.4s; }
  #error-log { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 40; display: flex; flex-direction: column; gap: 6px; align-items: center; pointer-events: none; width: max-content; max-width: 90%; }
  .err-msg { background: rgba(180,20,20,0.92); border: 1px solid #ef4444; border-radius: 6px; color: #fff; font-size: 8px; padding: 8px 14px; letter-spacing: 1px; animation: fadeout 5s forwards; white-space: nowrap; }
  @keyframes fadeout { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>
<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-label">Your Twitch Channel</div>
    <div class="setup-input-row">
      <div class="setup-input-wrap">
        <span>#</span>
        <input id="channel-input" type="text" placeholder="channelname" autocomplete="off" spellcheck="false">
      </div>
      <button class="setup-btn" onclick="startOverlay()">START</button>
    </div>
    <div class="setup-hint">Your channel name is saved automatically — you won't need to enter it again.</div>
    <div class="setup-error" id="setup-error">Please enter a channel name.</div>
  </div>
</div>
<div id="overlay">
  <div id="banner">
    <div class="banner-box">
      <svg class="banner-ball" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" fill="#1a1028" stroke="#f5c518" stroke-width="1.5"/>
        <line x1="2" y1="16" x2="30" y2="16" stroke="#f5c518" stroke-width="1.5"/>
        <path d="M2 16 A14 14 0 0 1 30 16" fill="#ef4444" opacity="0.3"/>
        <circle cx="16" cy="16" r="4" fill="#1a1028" stroke="#f5c518" stroke-width="1.5"/>
        <circle cx="16" cy="16" r="2" fill="#f5c518"/>
      </svg>
      <div>
        <div class="banner-label">WILD POKEMON APPEARED IN CHAT</div>
        <div class="banner-name">A wild <em id="bname">???</em> appeared<span class="blink">!</span></div>
      </div>
    </div>
  </div>
  <div id="error-log"></div>
</div>

function startOverlay() {
  var input = document.getElementById('channel-input').value.trim().replace(/^#/, '').toLowerCase();
  if (!input) { document.getElementById('setup-error').style.display = 'block'; return; }
  localStorage.setItem(STORAGE_KEY, input);
  launchOverlay(input);
}

function launchOverlay(channel) {
  streamerChannel = channel;
  document.getElementById('setup-screen').classList.add('hidden');
  var allChannels = STATIC_CHANNELS.slice();
  if (allChannels.indexOf(channel) === -1) allChannels.push(channel);
  if (WILDUSER_AUTH.indexOf(channel) === -1) WILDUSER_AUTH.push(channel);
  allChannels.forEach(function(ch) { connectChannel(ch); });
}

window.addEventListener('load', function() {
  var saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    launchOverlay(saved);
  } else {
    document.getElementById('channel-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') startOverlay();
    });
  }
});

function toSlug(s) {
  return s.toLowerCase().replace(/\u00e9/g,'e').replace(/['']/g,"'").replace(/\s+/g,'-').replace(/[^a-z0-9\-']/g,'');
}

function parseSpawnName(raw) {
  var formMatch = raw.match(/\(([^)]+)\)/);
  var formHint  = formMatch ? formMatch[1].trim() : null;
  var cleanName = raw.replace(/\s*\([^)]+\)/g,'').replace(/[\u2640\u2642\u266a]/g,'').trim();
  var baseKey   = toSlug(cleanName);
  var formKey   = null;
  if (formHint) { var fSlug = toSlug(formHint); if (fSlug) formKey = baseKey+'-'+fSlug; }
  return { cleanName:cleanName, baseKey:baseKey, formKey:formKey, formHint:formHint };
}

function localLookup(baseKey, formKey) {
  function stripped(k) { return k.replace(/[^a-z0-9]/g,''); }
  var keys = formKey ? [formKey,baseKey] : [baseKey];
  for (var i=0;i<keys.length;i++) {
    var k=keys[i];
    if (POKEMON_IDS[k]) return POKEMON_IDS[k];
    if (ALIASES[k])     return ALIASES[k];
    var s=stripped(k);
    for (var pk in POKEMON_IDS) { if (stripped(pk)===s) return POKEMON_IDS[pk]; }
    for (var ak in ALIASES)     { if (stripped(ak)===s) return ALIASES[ak]; }
  }
  return null;
}

function pokeAPIDirectFetch(slug) {
  return fetch(POKEAPI+'pokemon/'+encodeURIComponent(slug)+'/')
    .then(function(r){if(!r.ok)throw new Error();return r.json();})
    .then(function(d){return d.id;}).catch(function(){return null;});
}

function pokeAPISpeciesVarieties(baseKey) {
  return fetch(POKEAPI+'pokemon-species/'+encodeURIComponent(baseKey)+'/')
    .then(function(r){if(!r.ok)throw new Error();return r.json();})
    .then(function(species){
      var varieties=species.varieties||[];
      varieties.sort(function(a,b){return b.is_default?1:-1;});
      var idx=0;
      function tryVariety(){
        if(idx>=varieties.length) return Promise.resolve(null);
        var url=varieties[idx++].pokemon.url;
        return fetch(url).then(function(r){if(!r.ok)throw new Error();return r.json();})
          .then(function(d){return d.id;}).catch(function(){return tryVariety();});
      }
      return tryVariety();
    }).catch(function(){return null;});
}

var FUZZY_MAX_DISTANCE=3;
function levenshtein(a,b){
  var m=a.length,n=b.length;
  if(m===0)return n; if(n===0)return m;
  if(Math.abs(m-n)>FUZZY_MAX_DISTANCE) return FUZZY_MAX_DISTANCE+1;
  var prev=[],curr=[];
  for(var j=0;j<=n;j++) prev[j]=j;
  for(var i=1;i<=m;i++){
    curr[0]=i;
    for(var j2=1;j2<=n;j2++){
      curr[j2]=a[i-1]===b[j2-1]?prev[j2-1]:1+Math.min(prev[j2-1],prev[j2],curr[j2-1]);
    }
    var tmp=prev;prev=curr;curr=tmp;
  }
  return prev[n];
}
function fuzzyLocalLookup(baseKey){
  var best=null,bestDist=FUZZY_MAX_DISTANCE+1,bestKey=null;
  function check(key,id){var d=levenshtein(baseKey,key);if(d<bestDist){bestDist=d;best=id;bestKey=key;}}
  for(var pk in POKEMON_IDS) check(pk,POKEMON_IDS[pk]);
  for(var ak in ALIASES)     check(ak,ALIASES[ak]);
  return bestDist<=FUZZY_MAX_DISTANCE?{id:best,key:bestKey}:null;
}
function keyToDisplayName(key){return key.replace(/-/g,' ').replace(/\w/g,function(c){return c.toUpperCase();});}

function resolveSprite(parsed,deep){
  var localId=localLookup(parsed.baseKey,parsed.formKey);
  if(localId) return Promise.resolve({id:localId,correctedName:null});
  var root=parsed.baseKey.split('-')[0];
  var spaceKey=parsed.baseKey.replace(/-/g,' ');
  var noSepKey=parsed.baseKey.replace(/-/g,'');
  var altSlug=parsed.baseKey.replace(/[^a-z0-9-]/g,'');
  var slugs=[];
  if(parsed.formKey) slugs.push(parsed.formKey);
  slugs.push(parsed.baseKey);
  if(spaceKey!==parsed.baseKey) slugs.push(spaceKey);
  if(noSepKey!==parsed.baseKey&&slugs.indexOf(noSepKey)===-1) slugs.push(noSepKey);
  if(altSlug!==parsed.baseKey&&slugs.indexOf(altSlug)===-1) slugs.push(altSlug);
  if(parsed.formKey&&parsed.formHint){
    var fsk=parsed.baseKey+' '+parsed.formHint.toLowerCase();
    var fak=parsed.formKey.replace(/-/g,' ');
    if(slugs.indexOf(fsk)===-1) slugs.push(fsk);
    if(slugs.indexOf(fak)===-1) slugs.push(fak);
  }
  if(root!==parsed.baseKey&&slugs.indexOf(root)===-1) slugs.push(root);
  var idx=0;
  function tryDirect(){
    if(idx>=slugs.length) return Promise.resolve(null);
    return pokeAPIDirectFetch(slugs[idx++]).then(function(id){return id!==null?{id:id,correctedName:null}:tryDirect();});
  }
  return tryDirect().then(function(result){
    if(result!==null) return result;
    if(!deep) return null;
    var sc=[parsed.baseKey];
    if(spaceKey!==parsed.baseKey) sc.push(spaceKey);
    if(root!==parsed.baseKey) sc.push(root);
    var si=0;
    function trySpecies(){
      if(si>=sc.length) return Promise.resolve(null);
      return pokeAPISpeciesVarieties(sc[si++]).then(function(id){return id!==null?{id:id,correctedName:null}:trySpecies();});
    }
    return trySpecies().then(function(sr){
      if(sr!==null) return sr;
      var fr=fuzzyLocalLookup(parsed.baseKey);
      if(fr!==null) return {id:fr.id,correctedName:keyToDisplayName(fr.key)};
      if(root!==parsed.baseKey){var frr=fuzzyLocalLookup(root);if(frr!==null)return{id:frr.id,correctedName:keyToDisplayName(frr.key)};}
      return null;
    });
  });
}

var bannerQueue=[],bannerBusy=false,bannerTimer=null;
function queueBanner(name,durationMs,onShow){bannerQueue.push({name:name,durationMs:durationMs||10000,onShow:onShow||null});if(!bannerBusy)processQueue();}
function processQueue(){if(bannerQueue.length===0){bannerBusy=false;return;}bannerBusy=true;var item=bannerQueue.shift();showBannerNow(item.name,item.durationMs,item.onShow);}

function handleSpawn(raw){
  var parsed=parseSpawnName(raw),key=parsed.baseKey,now=Date.now();
  if(spawnCooldowns[key]&&(now-spawnCooldowns[key])<SPAWN_COOLDOWN_MS) return;
  spawnCooldowns[key]=now;
  queueBanner(parsed.cleanName,10000,function(){resolveSprite(parsed,false).then(function(result){if(result)spawnSprites(result.id);});});
}
function handleBouncy(raw,sourceIndex){
  var parsed=parseSpawnName(raw);
  resolveSprite(parsed,true).then(function(result){
    var displayName=(result&&result.correctedName)?result.correctedName:parsed.cleanName;
    queueBanner(displayName,10000,function(){if(result)spawnSprites(result.id,sourceIndex);});
  });
}

function handleUserJoin(nick){
  if(!wildUserEnabled)return;

function resolveGifUrl(id,forcedSource){
  var pngUrl=SPRITE_PNG+id+'.png';
  if(forcedSource===4) return Promise.resolve(pngUrl);
  if(forcedSource>=1&&forcedSource<=3) return Promise.resolve(SPRITE_GIF_SOURCES[forcedSource-1]+id+'.gif');
  var si=0;
  function tryNext(){
    if(si>=SPRITE_GIF_SOURCES.length) return Promise.resolve(pngUrl);
    var url=SPRITE_GIF_SOURCES[si++]+id+'.gif';
    return fetch(url,{method:'HEAD'}).then(function(r){return r.ok?url:tryNext();}).catch(function(){return tryNext();});
  }
  return tryNext();
}

function spawnSprites(id,sourceIndex){
  var W=overlay.offsetWidth,H=overlay.offsetHeight;
  var forcedSource=(sourceIndex!==undefined&&sourceIndex!==null)?sourceIndex:null;
  resolveGifUrl(id,forcedSource).then(function(spriteUrl){
    var pngUrl=SPRITE_PNG+id+'.png';
    for(var i=0;i<pokeSpritesCount;i++){
      (function(spriteIndex){
        var img=document.createElement('img');
        img.className='poke-sprite';
        // Sources 3 and 4 use smaller native sprites, so double the render size.
        var size=(forcedSource===3||forcedSource===4)?192:96;
        var x=Math.random()*(W-size),y=Math.random()*(H-size-40);
        var spd=1.4+Math.random()*1.8,ang=Math.random()*Math.PI*2;
        var vx=Math.cos(ang)*spd,vy=Math.sin(ang)*spd,sc=1;
        img.style.cssText='left:'+x+'px;top:'+y+'px;width:'+size+'px;height:'+size+'px;transform:scale('+sc+');opacity:0;';
        overlay.appendChild(img);
        // FIX 3: Double-layer fallback. GIF fails → try PNG. PNG also fails →
        // remove broken element and spawn pokeballs (once, on the first sprite).
        img.onerror=function(){
          img.onerror=function(){
            if(img.parentNode) img.parentNode.removeChild(img);
            if(spriteIndex===0) spawnPokeballs();
          };
          img.src=pngUrl;
        };
        img.src=spriteUrl;
        setTimeout(function(){img.style.opacity='1';},50);
        var aid;
        function step(){
          x+=vx;y+=vy;
          var maxX=W-size*sc,maxY=H-size*sc-40;
          if(x<=0){x=0;vx=Math.abs(vx);} if(x>=maxX){x=maxX;vx=-Math.abs(vx);}
          if(y<=0){y=0;vy=Math.abs(vy);} if(y>=maxY){y=maxY;vy=-Math.abs(vy);}
          img.style.left=x+'px';img.style.top=y+'px';
          aid=requestAnimationFrame(step);
        }
        aid=requestAnimationFrame(step);
        setTimeout(function(){cancelAnimationFrame(aid);img.style.transition='opacity 0.5s';img.style.opacity='0';setTimeout(function(){if(img.parentNode)img.parentNode.removeChild(img);},500);},10000);
      })(i);
    }
  });
}

var POKEBALL_SVG='data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#fff" stroke="#222" stroke-width="3"/><path d="M2 50 A48 48 0 0 1 98 50 Z" fill="#e53935"/><rect x="2" y="47" width="96" height="6" fill="#222"/><circle cx="50" cy="50" r="12" fill="#fff" stroke="#222" stroke-width="3"/><circle cx="50" cy="50" r="6" fill="#ddd"/></svg>');
function spawnPokeballs(){
  var W=overlay.offsetWidth,H=overlay.offsetHeight;
  for(var i=0;i<10;i++){
    (function(){
      var img=document.createElement('img');
      img.className='poke-sprite';
      var size=80,x=Math.random()*(W-size),y=Math.random()*(H-size-40);
      var spd=1.2+Math.random()*2.2,ang=Math.random()*Math.PI*2;
      var vx=Math.cos(ang)*spd,vy=Math.sin(ang)*spd,sc=0.7+Math.random()*0.7;
      var rot=0,rspd=(Math.random()-0.5)*4;
      img.src=POKEBALL_SVG;
      img.style.cssText='left:'+x+'px;top:'+y+'px;opacity:0;width:'+size+'px;height:'+size+'px;position:absolute;pointer-events:none;';
      overlay.appendChild(img);
      setTimeout(function(){img.style.opacity='1';},50);
      var aid;
      function step(){x+=vx;y+=vy;rot+=rspd;var maxX=W-size*sc,maxY=H-size*sc-40;if(x<=0){x=0;vx=Math.abs(vx);}if(x>=maxX){x=maxX;vx=-Math.abs(vx);}if(y<=0){y=0;vy=Math.abs(vy);}if(y>=maxY){y=maxY;vy=-Math.abs(vy);}img.style.left=x+'px';img.style.top=y+'px';img.style.transform='scale('+sc+') rotate('+rot+'deg)';aid=requestAnimationFrame(step);}
      aid=requestAnimationFrame(step);
      setTimeout(function(){cancelAnimationFrame(aid);img.style.transition='opacity 0.5s';img.style.opacity='0';setTimeout(function(){if(img.parentNode)img.parentNode.removeChild(img);},500);},10000);
    })();
  }
}

var connections={};
function isWildUserAuthorized(nick){return WILDUSER_AUTH.indexOf(nick)!==-1;}

function parseLine(line,socket){
  if(!line)return;
  if(line.indexOf('PING')===0){socket.send('PONG :tmi.twitch.tv');return;}
  var m=line.match(/:([^!]+)![^ ]+ PRIVMSG #[^ ]+ :(.+)/);
  if(!m)return;
  var nick=m[1].toLowerCase(),msg=m[2].trim();
  if(msg.charCodeAt(0)===1) msg=msg.slice(8).replace(/\x01$/,'').trim();
  handleUserJoin(nick);
  if(WILDUSER_ON_RE.test(msg)){if(isWildUserAuthorized(nick)){wildUserEnabled=true;localStorage.setItem(WILDUSER_STORAGE_KEY,'true');wildUserSeen=new Set();}return;}
  if(WILDUSER_OFF_RE.test(msg)){if(isWildUserAuthorized(nick)){wildUserEnabled=false;localStorage.setItem(WILDUSER_STORAGE_KEY,'false');wildUserSeen=new Set();}return;}
  if(CLEARCHANNEL_RE.test(msg)){clearChannel();return;}
  var bsMatch=msg.match(BOUNCYSPRITES_RE);
  if(bsMatch){var n=parseInt(bsMatch[1]);if(n>0&&n<=100){pokeSpritesCount=n;localStorage.setItem(SPRITES_STORAGE_KEY,n);}return;}
  if(BOUNCY_POKEBALL_RE.test(msg)){spawnPokeballs();return;}
  var bouncy=msg.match(BOUNCY_RE);
  if(bouncy){handleBouncy(bouncy[1].trim(),bouncy[2]?parseInt(bouncy[2]):null);return;}
  if(nick!=='pokemoncommunitygame')return;
  var sm=msg.match(SPAWN_RE);
  if(sm) handleSpawn(sm[1].trim());
}

function connectChannel(channel){
  var state=connections[channel]||{attempts:0,ws:null,pingTimer:null,reconnTimer:null};
  connections[channel]=state;
  if(state.ws){state.ws.onclose=null;state.ws.close();}
  clearTimeout(state.reconnTimer);clearInterval(state.pingTimer);
  var ws;
  try{ws=new WebSocket('wss://irc-ws.chat.twitch.tv:443');}
  catch(e){showError('ERROR: Could not connect to #'+channel+' — '+e.message);return;}
  state.ws=ws;
  var nick='justinfan'+Math.floor(Math.random()*99999);
  ws.onopen=function(){ws.send('PASS SCHMOOPIIE');ws.send('NICK '+nick);ws.send('JOIN #'+channel);state.pingTimer=setInterval(function(){if(ws&&ws.readyState===1)ws.send('PING :tmi.twitch.tv');},240000);state.attempts=0;};
  ws.onmessage=function(e){e.data.split('\r\n').forEach(function(line){parseLine(line,ws);});};
  ws.onerror=function(){showError('ERROR: WebSocket failed for #'+channel);};
  ws.onclose=function(){clearInterval(state.pingTimer);state.attempts++;var delay=Math.min(state.attempts*3000,30000);if(state.attempts<=10){showError('DISCONNECTED from #'+channel+' — reconnecting in '+(delay/1000)+'s ('+state.attempts+'/10)');state.reconnTimer=setTimeout(function(){connectChannel(channel);},delay);}else{showError('FAILED: Could not reconnect to #'+channel+' after 10 attempts. Reload the page.');}};
}
</script>
</body>
</html>
